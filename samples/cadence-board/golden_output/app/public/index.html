<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cadence — Personal Kanban</title>
    <meta
      name="description"
      content="Cadence is a calm, single-board Kanban for moving personal work from Backlog to Done."
    />
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%234f46e5'/%3E%3Crect x='8' y='8' width='4' height='16' rx='2' fill='white'/%3E%3Crect x='14' y='8' width='4' height='11' rx='2' fill='white' opacity='0.8'/%3E%3Crect x='20' y='8' width='4' height='7' rx='2' fill='%23fbbf24'/%3E%3C/svg%3E"
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <!-- Inline icon sprite (Lucide-derived 24x24 paths, MIT). -->
    <svg width="0" height="0" style="position: absolute" aria-hidden="true">
      <symbol id="i-plus" viewBox="0 0 24 24">
        <path d="M12 5v14M5 12h14" />
      </symbol>
      <symbol id="i-chevron-left" viewBox="0 0 24 24">
        <path d="M15 18l-6-6 6-6" />
      </symbol>
      <symbol id="i-chevron-right" viewBox="0 0 24 24">
        <path d="M9 18l6-6-6-6" />
      </symbol>
      <symbol id="i-pencil" viewBox="0 0 24 24">
        <path d="M12 20h9" />
        <path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z" />
      </symbol>
      <symbol id="i-trash" viewBox="0 0 24 24">
        <path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2m3 0v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6" />
        <path d="M10 11v6M14 11v6" />
      </symbol>
      <symbol id="i-x" viewBox="0 0 24 24">
        <path d="M18 6 6 18M6 6l12 12" />
      </symbol>
      <symbol id="i-tag" viewBox="0 0 24 24">
        <path d="M12.586 2.586A2 2 0 0 0 11.172 2H4a2 2 0 0 0-2 2v7.172a2 2 0 0 0 .586 1.414l8.704 8.704a2.426 2.426 0 0 0 3.42 0l6.58-6.58a2.426 2.426 0 0 0 0-3.42z" />
        <circle cx="7.5" cy="7.5" r="1.2" />
      </symbol>
      <symbol id="i-inbox" viewBox="0 0 24 24">
        <path d="M22 12h-6l-2 3h-4l-2-3H2" />
        <path d="M5.45 5.11 2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z" />
      </symbol>
    </svg>

    <a class="skip-link" href="#board">Skip to board</a>

    <header class="topbar">
      <div class="topbar__inner">
        <div class="brand">
          <span class="brand__mark" aria-hidden="true">
            <span class="brand__bar brand__bar--1"></span>
            <span class="brand__bar brand__bar--2"></span>
            <span class="brand__bar brand__bar--3"></span>
          </span>
          <span class="brand__name">Cadence</span>
          <span class="brand__tag">Personal Kanban</span>
        </div>

        <div class="toolbar">
          <div class="filter" role="group" aria-label="Filter by tag">
            <svg class="filter__icon" aria-hidden="true"><use href="#i-tag" /></svg>
            <label class="visually-hidden" for="tag-filter">Filter by tag</label>
            <select id="tag-filter" class="filter__select" data-filter>
              <option value="all">All tags</option>
            </select>
            <button
              id="clear-filter"
              class="filter__clear"
              type="button"
              data-clear-filter
              hidden
            >
              Clear filter
            </button>
          </div>

          <button id="add-card" class="btn btn--primary" type="button" data-add-card>
            <svg class="btn__icon" aria-hidden="true"><use href="#i-plus" /></svg>
            Add card
          </button>
        </div>
      </div>
    </header>

    <main id="board" class="board" aria-busy="true">
      <!-- Columns are rendered here by app.js -->
      <div class="board__loading" data-loading>
        <span class="spinner" aria-hidden="true"></span>
        <p>Loading your board…</p>
      </div>
    </main>

    <!-- Card editor modal (create + edit share one dialog). -->
    <div class="modal" id="card-modal" data-modal hidden>
      <div class="modal__backdrop" data-modal-dismiss></div>
      <div
        class="modal__dialog"
        role="dialog"
        aria-modal="true"
        aria-labelledby="modal-title"
      >
        <div class="modal__head">
          <h2 id="modal-title" class="modal__title" data-modal-title>Add a card</h2>
          <button
            class="modal__close"
            type="button"
            aria-label="Close"
            data-modal-dismiss
          >
            <svg aria-hidden="true"><use href="#i-x" /></svg>
          </button>
        </div>

        <form class="form" id="card-form" data-card-form novalidate>
          <input type="hidden" name="id" data-field-id />

          <div class="field">
            <label class="field__label" for="field-title">Title</label>
            <input
              class="field__input"
              id="field-title"
              name="title"
              type="text"
              maxlength="120"
              autocomplete="off"
              placeholder="What needs doing?"
              data-field-title
              required
            />
            <p class="field__error" data-title-error hidden>Give the card a title.</p>
          </div>

          <div class="field">
            <label class="field__label" for="field-description">Description</label>
            <textarea
              class="field__input field__input--area"
              id="field-description"
              name="description"
              rows="3"
              maxlength="600"
              placeholder="Add a little detail (optional)."
              data-field-description
            ></textarea>
          </div>

          <div class="field-row">
            <div class="field">
              <label class="field__label" for="field-priority">Priority</label>
              <select
                class="field__input"
                id="field-priority"
                name="priority"
                data-field-priority
              >
                <option value="Low">Low</option>
                <option value="Med" selected>Med</option>
                <option value="High">High</option>
              </select>
            </div>

            <div class="field">
              <label class="field__label" for="field-tag">Tag</label>
              <input
                class="field__input"
                id="field-tag"
                name="tag"
                type="text"
                maxlength="40"
                autocomplete="off"
                placeholder="Design, Writing…"
                list="tag-suggestions"
                data-field-tag
              />
              <datalist id="tag-suggestions" data-tag-suggestions></datalist>
            </div>
          </div>

          <div class="form__actions">
            <button class="btn btn--ghost" type="button" data-modal-dismiss>Cancel</button>
            <button class="btn btn--primary" type="submit" data-form-submit>Save card</button>
          </div>
        </form>
      </div>
    </div>

    <!-- Error toast. -->
    <div class="toast" id="toast" role="status" aria-live="polite" data-toast hidden>
      <svg class="toast__icon" aria-hidden="true"><use href="#i-x" /></svg>
      <span class="toast__message" data-toast-message></span>
    </div>

    <script src="/app.js" type="module"></script>
  </body>
</html>
